<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width: 400px;">
    <h3 class="text-center mb-3">Add Student</h3>

    <form method="POST">
        <input type="text" name="roll_number" class="form-control mb-2" placeholder="Roll Number" required>
        <input type="text" name="name" class="form-control mb-2" placeholder="Name" required>
        <input type="number" name="age" class="form-control mb-2" placeholder="Age">
        <input type="text" name="course" class="form-control mb-2" placeholder="Course">

        <button class="btn btn-primary w-100">Add Student</button>
    </form>

    {% if msg %}
    <div class="alert alert-info mt-3 text-center">
        {{ msg }}
    </div>
    {% endif %}

    <a href="/" class="btn btn-link mt-2">Back</a>
</div>

</body>
</html>
