<!DOCTYPE html>
<html>
<head>
    <title>Search Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width: 400px;">
    <h3 class="text-center mb-3">Search Student</h3>

    <form method="POST">
        <input type="text" name="roll_number" class="form-control mb-2" placeholder="Roll Number" required>
        <button class="btn btn-success w-100">Search</button>
    </form>

    {% if msg %}
    <div class="alert alert-warning mt-3 text-center">
        {{ msg }}
    </div>
    {% endif %}

    {% if student %}
    <table class="table table-bordered mt-3">
        <tr><th>Roll</th><td>{{ student[0] }}</td></tr>
        <tr><th>Name</th><td>{{ student[1] }}</td></tr>
        <tr><th>Age</th><td>{{ student[2] }}</td></tr>
        <tr><th>Course</th><td>{{ student[3] }}</td></tr>
    </table>
    {% endif %}

    <a href="/" class="btn btn-link mt-2">Back</a>
</div>

</body>
</html>
